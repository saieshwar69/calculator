<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Calculator</title>
  <meta name="description" content="A responsive browser-based calculator with keyboard support." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="calc" role="application" aria-label="Calculator">
    <div class="calc__display">
      <div id="history" class="calc__history" aria-live="polite"></div>
      <div id="output" class="calc__output" aria-live="assertive">0</div>
    </div>

    <div class="calc__keys">
      <button class="key key--fn" data-action="clear">AC</button>
      <button class="key key--fn" data-action="sign">+/−</button>
      <button class="key key--fn" data-action="percent">%</button>
      <button class="key key--op" data-op="/">÷</button>

      <button class="key" data-num="7">7</button>
      <button class="key" data-num="8">8</button>
      <button class="key" data-num="9">9</button>
      <button class="key key--op" data-op="*">×</button>

      <button class="key" data-num="4">4</button>
      <button class="key" data-num="5">5</button>
      <button class="key" data-num="6">6</button>
      <button class="key key--op" data-op="-">−</button>

      <button class="key" data-num="1">1</button>
      <button class="key" data-num="2">2</button>
      <button class="key" data-num="3">3</button>
      <button class="key key--op" data-op="+">+</button>

      <button class="key key--zero" data-num="0">0</button>
      <button class="key" data-action="decimal">.</button>
      <button class="key key--equals" data-action="equals">=</button>
    </div>
  </main>

  <footer class="footer">
    Tip: use your keyboard! <kbd>0–9</kbd> <kbd>+ − × ÷</kbd> <kbd>Enter</kbd> <kbd>Esc</kbd>
  </footer>

  <script src="script.js"></script>
</body>
</html>
